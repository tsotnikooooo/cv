<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Modal ფანჯრის ტესტი</title>
    <style>
        /* ფონური ბნელი ფენა */
        .modal-bg {
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.5); 
            justify-content: center; align-items: center;
        }
        /* თავად ფანჯარა */
        .modal-content {
            background: white; padding: 30px; 
            border-radius: 8px; text-align: center;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body style="text-align: center; margin-top: 50px; font-family: sans-serif;">

    <h2>საიტის შიდა ფანჯრის ტესტი</h2>
    <button onclick="toggleModal(true)" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">ფანჯრის ჩვენება</button>

    <div id="myModal" class="modal-bg">
        <div class="modal-content">
            <h3>🎉 ჰურაა! ფანჯარა მუშაობს!</h3>
            <p>ეს არის ახალი ამომხტარი ფანჯარა.</p>
            <button onclick="toggleModal(false)" style="padding: 5px 15px; cursor: pointer;">დახურვა</button>
        </div>
    </div>

    <script>
        function toggleModal(show) {
            const modal = document.getElementById('myModal');
            modal.style.display = show ? 'flex' : 'none';
        }
    </script>

</body>
</html>
